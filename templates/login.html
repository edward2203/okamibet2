<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OkamiBet - Admin Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #121519;
      --bg-panel: #1e2227;
      --bg-card: #282c34;
      --accent-orange: #f39c12;
      --accent-orange-hover: #e67e22;
      --text-main: #ffffff;
      --text-muted: #a0aab2;
      --border-color: #333842;
      --danger-red: #e74c3c;
      --success-green: #27ae60;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header i {
      font-size: 48px;
      color: var(--accent-orange);
      margin-bottom: 15px;
    }

    .login-header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-orange);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background-color: var(--accent-orange);
      color: var(--text-main);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn-login:hover {
      background-color: var(--accent-orange-hover);
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-error {
      background-color: rgba(231, 76, 60, 0.2);
      border: 1px solid var(--danger-red);
      color: var(--danger-red);
    }

    .alert-info {
      background-color: rgba(39, 174, 96, 0.2);
      border: 1px solid var(--success-green);
      color: var(--success-green);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-shield-alt"></i>
      <h1>OkamiBet Admin</h1>
      <p>Ingresa tu contraseña para continuar</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'error' if category == 'error' else 'info' }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingresa la contraseña admin" required autofocus>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Ingresar
      </button>
    </form>
  </div>
</body>
</html>
